<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages.
      // Takes the deep-link path GitHub couldn't find and encodes it into a query
      // string, then redirects to the app root, where index.html decodes it back.
      // pathSegmentsToKeep = 0 for a custom domain (CNAME) served from root.
      // Set to 1 if deploying to https://<user>.github.io/<repo>/.
      var pathSegmentsToKeep = 0
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
