<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palette Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;600&family=Cormorant:wght@400;600&family=Newsreader:opsz@6..72&family=JetBrains+Mono&family=Quicksand:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: #0c0d10;
        color: #e8e8e8;
        padding: 32px 24px 80px;
      }
      .page { max-width: 1080px; margin: 0 auto; }
      h1 { font-family: Fraunces, serif; font-weight: 600; font-size: 1.9rem; margin: 0 0 4px; }
      .sub { color: #9aa0aa; margin: 0 0 32px; }
      .dir {
        margin: 0 0 40px;
        border: 1px solid #23262d;
        border-radius: 14px;
        overflow: hidden;
        background: #121317;
      }
      .dir__head { padding: 18px 22px 6px; }
      .dir__name { font-family: Fraunces, serif; font-size: 1.4rem; font-weight: 600; margin: 0; }
      .dir__mood { color: #9aa0aa; margin: 4px 0 0; font-size: 0.95rem; }
      .dir__type { color: #c7ccd4; margin: 8px 0 0; font-size: 0.9rem; }
      .dir__type b { color: #fff; font-weight: 600; }

      .swatches { display: flex; flex-wrap: wrap; gap: 0; padding: 16px 22px 4px; }
      .sw { width: 132px; }
      .sw__chip {
        height: 64px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .sw__name { font-size: 0.8rem; margin: 6px 0 0; color: #cfd4dc; }
      .sw__hex { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: #8b919b; }

      .grad { height: 28px; border-radius: 8px; margin: 10px 22px 0; border: 1px solid rgba(255,255,255,0.08); }

      .mocks { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 18px 22px 22px; }
      @media (max-width: 720px) { .mocks { grid-template-columns: 1fr; } }
      .mock {
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .mock__bar {
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 14px; font-size: 0.8rem;
      }
      .mock__nav { display: flex; gap: 10px; opacity: 0.8; font-size: 0.72rem; }
      .mock__body { padding: 14px; }
      .mock__h { font-size: 1.15rem; margin: 0 0 6px; }
      .mock__p { font-size: 0.82rem; line-height: 1.55; margin: 0 0 12px; }
      .mock__row { display: flex; gap: 8px; align-items: center; }
      .mock__btn {
        display: inline-block; padding: 6px 12px; border-radius: 8px;
        font-size: 0.78rem; font-weight: 600;
      }
      .mock__link { font-size: 0.78rem; }
      .mock__tag { font-size: 0.68rem; padding: 2px 8px; border-radius: 999px; }
      .label { font-size: 0.7rem; letter-spacing: 0.06em; text-transform: uppercase; color: #777d87; padding: 14px 22px 0; }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>Palette Preview</h1>
      <p class="sub">Real rendered colors, fonts, and mini mockups (light + dark) for each direction. Pick one and tell me — then I'll build it into the site.</p>
      <div id="root"></div>
    </div>

    <script>
      const DIRECTIONS = [
        {
          name: '1 · Lakeside Dusk',
          mood: 'Cozy cinematic — warm ember against a cold dusk lake. Best all-round fit.',
          type: ['Fraunces', 'Inter'],
          typeNote: '<b>Fraunces</b> (serif display) + <b>Inter</b> (body)',
          swatches: [
            ['Snow (bg)', '#F7F4EF'], ['Ink (text)', '#1F2933'], ['Lake (cool)', '#3E6D8E'],
            ['Ember (warm)', '#E0883C'], ['Mauve (soft)', '#B49AB0'], ['Border', '#D8D2C8'],
          ],
          gradient: 'linear-gradient(90deg, #3E6D8E, #B49AB0, #E0883C)',
          light: { bg: '#F7F4EF', surface: '#FFFFFF', ink: '#1F2933', muted: '#6B7280', accent: '#3E6D8E', warm: '#E0883C', border: '#E2DCD2', soft: '#B49AB0' },
          dark: { bg: '#14181F', surface: '#1B212B', ink: '#ECEBE6', muted: '#9AA0AA', accent: '#6FA0C0', warm: '#E8A05A', border: '#2A313C', soft: '#C2A6BE' },
        },
        {
          name: '2 · Sea Glass',
          mood: 'Airy minimal gallery — bright snowfield + clear sea. Most restrained.',
          type: ['Cormorant', 'Inter'],
          typeNote: '<b>Cormorant</b> (light serif) + <b>Inter</b> (body)',
          swatches: [
            ['Paper (bg)', '#FBFCFD'], ['Ink (text)', '#2B3A42'], ['Ice (cool)', '#AAC8D6'],
            ['Foam', '#BFD8CE'], ['Petal (soft)', '#E7C9D2'], ['Muted', '#7C8B92'],
          ],
          gradient: 'linear-gradient(90deg, #AAC8D6, #BFD8CE, #E7C9D2)',
          light: { bg: '#FBFCFD', surface: '#FFFFFF', ink: '#2B3A42', muted: '#7C8B92', accent: '#5E8DA3', warm: '#D98EA3', border: '#E6ECEF', soft: '#E7C9D2' },
          dark: { bg: '#0E1518', surface: '#15201F', ink: '#E6EEF0', muted: '#8E9CA2', accent: '#8FB6C7', warm: '#D7AEBC', border: '#22302F', soft: '#A6C8BC' },
        },
        {
          name: '3 · Documentary Mono',
          mood: 'Editorial film essay — near-monochrome, one faded accent, mono captions. Safest / most serious.',
          type: ['Newsreader', 'JetBrains Mono'],
          typeNote: '<b>Newsreader</b> (serif) + <b>JetBrains Mono</b> (labels/meta)',
          swatches: [
            ['Paper (bg)', '#EDEAE3'], ['Ink (text)', '#1A1A1A'], ['Accent (teal)', '#5E7E7A'],
            ['Muted', '#6E6A62'], ['Rule', '#CFCABE'], ['Card', '#F4F1EA'],
          ],
          gradient: 'linear-gradient(90deg, #1A1A1A, #5E7E7A, #CFCABE)',
          light: { bg: '#EDEAE3', surface: '#F6F3EC', ink: '#1A1A1A', muted: '#6E6A62', accent: '#5E7E7A', warm: '#9C6F4E', border: '#D6D1C5', soft: '#5E7E7A' },
          dark: { bg: '#161513', surface: '#1E1C19', ink: '#E7E3DA', muted: '#9A938A', accent: '#87A8A2', warm: '#C09372', border: '#2C2A25', soft: '#87A8A2' },
        },
        {
          name: '4 · Aurora Pastel',
          mood: 'Soft & dreamy — pastel dawn sky, rounded & tender. Boldest / most ACG-leaning.',
          type: ['Quicksand', 'Inter'],
          typeNote: '<b>Quicksand</b> (rounded) + soft serif',
          swatches: [
            ['Base (bg)', '#FCFBFE'], ['Ink (text)', '#3A3550'], ['Lavender', '#C9B8E4'],
            ['Pink', '#F3CBD3'], ['Ice', '#BBD6E8'], ['Muted', '#8A85A0'],
          ],
          gradient: 'linear-gradient(90deg, #C9B8E4, #F3CBD3, #BBD6E8)',
          light: { bg: '#FCFBFE', surface: '#FFFFFF', ink: '#3A3550', muted: '#8A85A0', accent: '#9B7FD0', warm: '#E59AAE', border: '#ECE7F3', soft: '#C9B8E4' },
          dark: { bg: '#16131F', surface: '#1F1B2B', ink: '#EDE9F5', muted: '#9D97B2', accent: '#B6A0DA', warm: '#E3A9B8', border: '#2B2640', soft: '#9CC0D6' },
        },
      ]

      const FONT = {
        Fraunces: "'Fraunces', serif",
        Inter: "'Inter', sans-serif",
        Cormorant: "'Cormorant', serif",
        Newsreader: "'Newsreader', serif",
        'JetBrains Mono': "'JetBrains Mono', monospace",
        Quicksand: "'Quicksand', sans-serif",
      }

      function mock(p, headFont, mode) {
        const round = p.bg === '#FCFBFE' || p.bg === '#16131F' ? 12 : 8 // Aurora rounder
        return `
          <div class="mock" style="background:${p.bg};color:${p.ink}">
            <div class="mock__bar" style="background:${p.surface};border-bottom:1px solid ${p.border}">
              <span style="font-family:${headFont};font-weight:600;color:${p.ink}">Your Name</span>
              <span class="mock__nav" style="color:${p.muted}">
                <span style="color:${p.accent}">About</span><span>Pubs</span><span>Blog</span><span>Misc</span>
              </span>
            </div>
            <div class="mock__body">
              <div class="mock__h" style="font-family:${headFont};color:${p.ink}">A quiet line of intro</div>
              <p class="mock__p" style="color:${p.muted}">
                Body copy in the reading color. <span style="color:${p.accent}">A cool accent link</span> and a
                <span style="color:${p.warm}">warm one</span> for contrast.
              </p>
              <div class="mock__row">
                <span class="mock__btn" style="background:${p.warm};color:${pickFg(p.warm)};border-radius:${round}px">Read more</span>
                <span class="mock__tag" style="background:${p.soft};color:${pickFg(p.soft)};">tag</span>
                <span class="mock__link" style="color:${p.accent}">link →</span>
              </div>
            </div>
          </div>`
      }

      // crude luminance pick for legible text on a colored chip/button
      function pickFg(hex) {
        const c = hex.replace('#', '')
        const r = parseInt(c.slice(0, 2), 16), g = parseInt(c.slice(2, 4), 16), b = parseInt(c.slice(4, 6), 16)
        const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255
        return lum > 0.6 ? '#1c1c1c' : '#ffffff'
      }

      const root = document.getElementById('root')
      root.innerHTML = DIRECTIONS.map((d) => {
        const headFont = FONT[d.type[0]]
        const sw = d.swatches.map(([name, hex]) => `
          <div class="sw">
            <div class="sw__chip" style="background:${hex}"></div>
            <div class="sw__name">${name}</div>
            <div class="sw__hex">${hex}</div>
          </div>`).join('')
        return `
          <div class="dir">
            <div class="dir__head">
              <p class="dir__name" style="font-family:${headFont}">${d.name}</p>
              <p class="dir__mood">${d.mood}</p>
              <p class="dir__type">${d.typeNote}</p>
            </div>
            <div class="swatches">${sw}</div>
            <div class="grad" style="background:${d.gradient}"></div>
            <div class="label">Light / Dark applied</div>
            <div class="mocks">
              ${mock(d.light, headFont, 'light')}
              ${mock(d.dark, headFont, 'dark')}
            </div>
          </div>`
      }).join('')
    </script>
  </body>
</html>
